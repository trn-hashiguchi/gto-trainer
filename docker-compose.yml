services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: poker-gto-dev
    ports:
      - "53004:5173"
      - "53005:4173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    stdin_open: true
    tty: true

volumes:
  node_modules:
